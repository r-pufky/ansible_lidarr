---
###############################################################################
# Lidarr Role Options
###############################################################################
# Lidarr uses generic Servarr installation scripts.
#
# Updates:
# * Branch for new Debian releases.
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://github.com/Servarr/Wiki/tree/master/servarr
# * https://github.com/Lidarr/Lidarr/releases

lidarr___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-23',
    _debian='trixie',
    _app='v3.1.0.4875',
    _script_release='3.0.12',
    _script_date='2024-04-09',
  ) }}"

###############################################################################
# APT Packages
###############################################################################

lidarr___packages:
  - 'sqlite3'  # Lidarr DB.
  - 'libchromaprint-tools'  # Audio fingerprinting.
  - 'mediainfo'  # Audio file analysis.
  - 'gnupg2'  # GPG for certificates.
  - 'ca-certificates'  # Up to date certificates for certificate validation.
  - 'libicu76'  # International Unicode support for .NET.

  # Ansible.
  - 'xz-utils'  # xz archives.
  - 'rsync'  # ansible.posix.synchronize.

###############################################################################
# Lidarr GitHub Options
###############################################################################
# Reference:
# * https://github.com/Lidarr/Lidarr/releases/latest

lidarr___repo_url:
  'https://github.com/Lidarr/Lidarr/releases/download/'
lidarr___package: '{{
    "Lidarr.master." ~ lidarr___release._app[1:] ~ ".linux-core-x64.tar.gz"
  }}'

lidarr___app: "{{ {} | r_pufky.data.v3(

    _version=lidarr___release._app,
    _package=lidarr___package,
    _var_dir='/var/opt/lidarr',
    _cfg='/var/opt/lidarr/config.xml',
    _opt_dir='/opt/lidarr',
    _src_dir='/opt/lidarr/src',
    _app='/opt/lidarr/src/' ~ lidarr___release._app,
    _service='/etc/systemd/system/lidarr.service',
    _base_url=lidarr___repo_url,
    _url=lidarr___repo_url ~ lidarr___release._app ~ '/' ~ lidarr___package,
  ) }}"

###############################################################################
# Default Lidarr User/Group
###############################################################################

lidarr___group:
  name: 'media'
  gid: 5555

lidarr___user:
  name: 'media'
  group: 'media'
  uid: 5555
  shell: '/usr/sbin/nologin'
  home: '/nonexistent'
  create_home: false
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
