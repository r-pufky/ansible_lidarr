---
###############################################################################
# Restore
###############################################################################
# Find the latest set of backups and copy to remote. Restart services and
# validate they are running from role.
#
# Use synchronize instead of unarchive as metadata may be multi-GB.

- name: 'Restore | filesystem | enumerate all backups'
  delegate_to: 'localhost'
  ansible.builtin.find:
    paths: '{{ lidarr__cfg._backup_dir }}'
    patterns: '*.tar.xz'
    file_type: 'file'
    recurse: false
  register: lidarr__archive

# Grab datestamp from expected 'YYYY-MM-DDTHHMMSS_{FILE}' format.
- name: 'Restore | fact | parse latest backup'
  when: lidarr__archive.files | length > 0
  ansible.builtin.set_fact:
    lidarr__restore_archive: '{{

        (
          lidarr__archive.files |
          sort(attribute="mtime", reverse=true) |
          first
        ).path
      }}'

- name: '{{ "Restore | copy | " ~ lidarr__restore_archive }}'
  ansible.posix.synchronize:
    src: '{{ lidarr__restore_archive }}'
    dest: '{{ "/tmp/" ~ lidarr__restore_archive | basename }}'

- name:
    '{{ "Restore | filesystem | /tmp/" ~ lidarr__restore_archive | basename }}'
  ansible.builtin.command: '{{
      "/usr/bin/tar -xJpf " ~
      "/tmp/" ~ lidarr__restore_archive | basename ~
      " -C " ~ lidarr__cfg._var_dir ~ " --overwrite &&" ~
      "rm -f " ~  "/tmp/" ~ lidarr__restore_archive | basename
    }}'
  changed_when: true

- name: 'Restore | start'
  ansible.builtin.import_tasks: 'start.yml'

- name: 'Restore | success ✔'
  ansible.builtin.meta: 'end_host'
