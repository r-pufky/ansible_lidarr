---
# Backup/Restore are controlled exits and must be called in separate plays or
# it will consider play complete and move to verify.
- name: 'Converge'
  hosts: 'all'
  gather_facts: false
  tasks:
    # Inject config.xml and reset DBs; config.xml tested after restore.
    - name: 'Converge | role | r_pufky.arr.lidarr (pre-configured config.xml)'
      ansible.builtin.include_role:
        name: 'r_pufky.arr.lidarr'
      vars:
        lidarr_flg_config: true
        lidarr_cfg_d: '{{
            lookup("env", "MOLECULE_PROJECT_DIRECTORY") ~ "/templates/default"
          }}'

    - name: 'Converge | role | r_pufky.arr.lidarr (create db backup)'
      ansible.builtin.include_role:
        name: 'r_pufky.arr.lidarr'
      vars:
        lidarr_flg_backup: true

- name: 'Converge'
  hosts: 'all'
  gather_facts: false
  tasks:
    - name: 'Converge | role | r_pufky.arr.lidarr (restore)'
      ansible.builtin.include_role:
        name: 'r_pufky.arr.lidarr'
      vars:
        lidarr_flg_restore: true
